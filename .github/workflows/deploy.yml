name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag específica (deixar vazio = SHA do main mais recente)"
        required: false

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.PUBLIC_HOST }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine target tag
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync deploy artifacts
        # /opt/sentinelacs/ é sentinel:sentinel 0750 — celinet (rsync remoto)
        # não consegue escrever direto. Stage em /tmp + 'sudo install'
        # atômico para mover com dono/perms corretos. Mesmo padrão do
        # provision.yml.
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" 'rm -rf /tmp/sentinel-stage && mkdir -p /tmp/sentinel-stage/scripts'

          rsync -az \
            deploy/docker-compose.yml \
            deploy/docker-compose.prod.yml \
            "$SSH_USER@$SSH_HOST:/tmp/sentinel-stage/"

          rsync -az \
            deploy/scripts/ \
            "$SSH_USER@$SSH_HOST:/tmp/sentinel-stage/scripts/"

          ssh "$SSH_USER@$SSH_HOST" '
            set -e
            for f in /tmp/sentinel-stage/docker-compose.yml /tmp/sentinel-stage/docker-compose.prod.yml; do
              sudo install -o sentinel -g sentinel -m 0644 "$f" /opt/sentinelacs/
            done
            for f in /tmp/sentinel-stage/scripts/*.sh; do
              sudo install -o sentinel -g sentinel -m 0755 "$f" /opt/sentinelacs/scripts/
            done
            rm -rf /tmp/sentinel-stage
          '

      - name: Apply CWMP ACL reconciler (host-side, root)
        # Idempotente. Instala/atualiza os arquivos systemd que rodam o
        # reconciler de iptables para a porta 7547. Precisa root porque
        # mexe em /etc/systemd/system. Roda como `celinet` direto via
        # sudo (NOPASSWD) — não passa por `sudo -u sentinel` porque o
        # usuário sentinel é não-privilegiado.
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            'sudo /opt/sentinelacs/scripts/cwmp-acl-setup.sh' || \
            echo "::warning::cwmp-acl-setup falhou — pode estar desatualizado em prod"

      - name: Run deploy script (server-side)
        env:
          TARGET_TAG: ${{ steps.tag.outputs.value }}
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
            "sudo -u sentinel /opt/sentinelacs/scripts/deploy.sh $TARGET_TAG"

      - name: Notify Telegram on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_DEPLOY_CHAT }}
          SHA: ${{ steps.tag.outputs.value }}
        run: |
          curl -fsSL --max-time 5 \
            -d "chat_id=$TELEGRAM_CHAT_ID" \
            -d "text=❌ Deploy falhou — SHA \`$SHA\` (workflow $GITHUB_RUN_ID)" \
            -d "parse_mode=Markdown" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage"
