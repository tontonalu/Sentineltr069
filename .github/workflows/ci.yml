name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: templ generate
        # _templ.go são gitignored — gerar antes do lint resolver os tipos.
        run: templ generate
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  templ-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      # Idempotência: gerar 2× e comparar — pega .templ que ficou fora de sync
      # (sem precisar commitar os _templ.go).
      - name: Idempotência do templ generate
        run: |
          templ generate
          find internal/views -name '*_templ.go' -print0 | sort -z | xargs -0 sha256sum > /tmp/run1.sum
          templ generate
          find internal/views -name '*_templ.go' -print0 | sort -z | xargs -0 sha256sum > /tmp/run2.sum
          diff /tmp/run1.sum /tmp/run2.sum

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: templ generate
        run: templ generate
      - name: go mod download
        run: go mod download
      - name: Test with race detector
        run: go test -race -coverprofile=cover.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
          if-no-files-found: ignore

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: templ generate
        run: templ generate
      - name: Run gosec
        uses: securego/gosec@master
        with:
          # G101 falso-positivo: NOMES de env vars (não credenciais hardcoded).
          # G104 estilístico: resp.Body.Close() em paths de erro já tratado.
          args: '-quiet -exclude=G101,G104 ./...'
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, templ-check, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          # Lowercase obrigatório para GHCR (repo "Sentineltr069" -> "sentineltr069").
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
