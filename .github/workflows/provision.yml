name: Provision (1ª vez)

# Bootstrap completo de um servidor Debian 13 limpo via GitHub Actions.
#
# RODA 1× (workflow_dispatch). Sequência:
#   1. Usa BOOTSTRAP_SSH_PASSWORD via sshpass para ENTRAR pela 1ª vez.
#   2. Instala SSH_PUBLIC_KEY no authorized_keys do servidor.
#   3. Re-conecta via SSH key (sem mais senha).
#   4. Sincroniza scripts + compose files para /opt/sentinelacs/.
#   5. Roda bootstrap.sh (Docker, ufw, fail2ban, hardening — DESLIGA senha).
#   6. Roda init-secrets.sh não-interativo (gera .env com secrets aleatórios).
#   7. Login GHCR usando GHCR_PAT.
#   8. Roda deploy.sh (pull + migrate + up + healthcheck).
#   9. Seed do admin inicial → imprime senha provisória nos logs do workflow.
#
# DEPOIS DE RODAR 1×:
#   • REMOVA o secret BOOTSTRAP_SSH_PASSWORD (já não é usado)
#   • Troque a senha do celinet no servidor (passwd celinet) — defesa extra
#   • Use deploy.yml para deploys subsequentes (auto após CI verde)
#
# ⚠️  Os logs do workflow (incluindo senha provisória do admin) ficam em
#    GitHub Actions — protegidos por permissão de repo, mas qualquer um
#    com acesso de leitura ao repo pode ver. Considere repo privado.

on:
  workflow_dispatch:
    inputs:
      seed_admin:
        description: "Criar usuário admin inicial?"
        type: boolean
        default: true
      reset_secrets:
        description: "Sobrescrever .env existente? (perigoso — perde sessões)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: provision-production
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: 🔍 Debug — context visibility
        env:
          BOOTSTRAP_SSH_PASSWORD: ${{ secrets.BOOTSTRAP_SSH_PASSWORD }}
          SSH_KEY:                ${{ secrets.SSH_KEY }}
          SSH_PUBLIC_KEY:         ${{ secrets.SSH_PUBLIC_KEY }}
          GHCR_PAT:               ${{ secrets.GHCR_PAT }}
        run: |
          echo "=== Variables (valores visíveis) ==="
          echo "vars.SSH_HOST     = '${{ vars.SSH_HOST }}'"
          echo "vars.SSH_USER     = '${{ vars.SSH_USER }}'"
          echo "vars.PUBLIC_HOST  = '${{ vars.PUBLIC_HOST }}'"
          echo "vars.ACME_EMAIL   = '${{ vars.ACME_EMAIL }}'"
          echo "vars.GHCR_OWNER   = '${{ vars.GHCR_OWNER }}'"
          echo "vars.ADMIN_EMAIL  = '${{ vars.ADMIN_EMAIL }}'"
          echo ""
          echo "=== Secrets (apenas LEN — sem vazar valor) ==="
          echo "BOOTSTRAP_SSH_PASSWORD length: ${#BOOTSTRAP_SSH_PASSWORD}"
          echo "SSH_KEY length:                ${#SSH_KEY}"
          echo "SSH_PUBLIC_KEY length:         ${#SSH_PUBLIC_KEY}"
          echo "GHCR_PAT length:               ${#GHCR_PAT}"
          echo ""
          echo "=== Contexto github ==="
          echo "actor:      ${{ github.actor }}"
          echo "event_name: ${{ github.event_name }}"
          echo "ref_name:   ${{ github.ref_name }}"
          echo "repo:       ${{ github.repository }}"

      - name: Validate required secrets
        env:
          BOOTSTRAP_SSH_PASSWORD: ${{ secrets.BOOTSTRAP_SSH_PASSWORD }}
          SSH_KEY:         ${{ secrets.SSH_KEY }}
          SSH_PUBLIC_KEY:  ${{ secrets.SSH_PUBLIC_KEY }}
          GHCR_PAT:        ${{ secrets.GHCR_PAT }}
          SSH_HOST:        ${{ vars.SSH_HOST }}
          SSH_USER:        ${{ vars.SSH_USER }}
          PUBLIC_HOST:     ${{ vars.PUBLIC_HOST }}
          ACME_EMAIL:      ${{ vars.ACME_EMAIL }}
          GHCR_OWNER:      ${{ vars.GHCR_OWNER }}
        run: |
          set -e
          missing=0
          for v in BOOTSTRAP_SSH_PASSWORD SSH_KEY SSH_PUBLIC_KEY GHCR_PAT SSH_HOST SSH_USER PUBLIC_HOST ACME_EMAIL GHCR_OWNER; do
            if [[ -z "${!v}" ]]; then
              echo "::error::secret/var '$v' está vazio"
              missing=1
            fi
          done
          [[ $missing -eq 0 ]] || exit 1

      - name: Install sshpass + rsync (no runner)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known_hosts (TOFU)
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Instalar SSH key (sshpass apenas se necessário)
        env:
          SSHPASS:        ${{ secrets.BOOTSTRAP_SSH_PASSWORD }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          SSH_HOST:       ${{ vars.SSH_HOST }}
          SSH_USER:       ${{ vars.SSH_USER }}
        run: |
          # IDEMPOTÊNCIA: em re-execuções, bootstrap.sh já desligou
          # PasswordAuthentication. Tentamos key auth primeiro — se funcionar,
          # pulamos sshpass (que falharia, e a key já está instalada mesmo).
          if ssh -o BatchMode=yes -o ConnectTimeout=5 "$SSH_USER@$SSH_HOST" 'true' 2>/dev/null; then
            echo "✓ Key auth já funciona — pulando sshpass (re-execução idempotente)"
            exit 0
          fi

          echo "Key auth ainda não funciona — instalando via sshpass (1ª execução)"

          # Idempotente: append apenas se a key ainda não está em authorized_keys.
          # NÃO sobrescreve — preserva chaves manuais que o operador tenha adicionado.
          sshpass -e ssh -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" \
            "set -e; \
             mkdir -p ~/.ssh && chmod 700 ~/.ssh; \
             touch ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys; \
             grep -qxF \"$SSH_PUBLIC_KEY\" ~/.ssh/authorized_keys || \
             echo \"$SSH_PUBLIC_KEY\" >> ~/.ssh/authorized_keys"

          echo "✓ SSH key instalada — sshpass não será mais usado"

      - name: Validar key auth funciona
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
        run: |
          ssh -o BatchMode=yes "$SSH_USER@$SSH_HOST" 'echo "key auth OK como $(whoami)@$(hostname)"'

      - name: Instalar pré-requisitos mínimos no servidor
        env:
          BOOTSTRAP_PWD: ${{ secrets.BOOTSTRAP_SSH_PASSWORD }}
          SSH_HOST:      ${{ vars.SSH_HOST }}
          SSH_USER:      ${{ vars.SSH_USER }}
        run: |
          # Debian 13 minimal vem sem rsync/curl/etc. O bootstrap.sh precisa
          # desses pacotes pra subir Docker, ufw, fail2ban, age. Como não há
          # NOPASSWD ainda, usamos sudo -S com a senha via stdin.
          #
          # PRÉ-REQUISITO: 'sudo' já instalado (única dependência circular —
          # foi instalado manualmente como root na primeira vez. Idempotente
          # nas execuções seguintes).
          ssh "$SSH_USER@$SSH_HOST" \
            "sudo -S -p '' bash -c '\
              export DEBIAN_FRONTEND=noninteractive; \
              apt-get update -qq && \
              apt-get install -y -qq \
                rsync \
                curl \
                ca-certificates \
                gnupg \
                lsb-release \
                openssl \
                age \
                ufw \
                fail2ban \
                unattended-upgrades \
                jq \
                git'" \
            <<< "$BOOTSTRAP_PWD"

      - name: Sync scripts (1ª vez — só o necessário para rodar bootstrap)
        env:
          BOOTSTRAP_PWD: ${{ secrets.BOOTSTRAP_SSH_PASSWORD }}
          SSH_HOST:      ${{ vars.SSH_HOST }}
          SSH_USER:      ${{ vars.SSH_USER }}
        run: |
          # Bootstrap precisa apenas dos scripts. Os compose files são copiados
          # APÓS bootstrap (quando sentinel user existe e NOPASSWD está ativo).
          # Antes do bootstrap, NÃO há sudoers configurado pra celinet sem
          # senha — primeiro mkdir/chown usa sudo -S com BOOTSTRAP_SSH_PASSWORD.
          ssh "$SSH_USER@$SSH_HOST" \
            "sudo -S -p '' bash -c 'mkdir -p /opt/sentinelacs/scripts && chown -R $SSH_USER:$SSH_USER /opt/sentinelacs'" \
            <<< "$BOOTSTRAP_PWD"

          # Sem --delete: bootstrap.sh pode ter criado outros arquivos (age keys,
          # cron, etc.) que NÃO devem ser apagados em re-execuções idempotentes.
          rsync -az \
            deploy/scripts/ \
            "$SSH_USER@$SSH_HOST:/opt/sentinelacs/scripts/"

          ssh "$SSH_USER@$SSH_HOST" 'chmod +x /opt/sentinelacs/scripts/*.sh'

      - name: Run bootstrap.sh (instala Docker, configura sudoers NOPASSWD)
        env:
          BOOTSTRAP_PWD: ${{ secrets.BOOTSTRAP_SSH_PASSWORD }}
          SSH_HOST:      ${{ vars.SSH_HOST }}
          SSH_USER:      ${{ vars.SSH_USER }}
        run: |
          # Última vez que usamos a senha — bootstrap configura sudoers NOPASSWD
          # para celinet daqui em diante.
          ssh "$SSH_USER@$SSH_HOST" \
            "sudo -S -p '' bash /opt/sentinelacs/scripts/bootstrap.sh" \
            <<< "$BOOTSTRAP_PWD"

      - name: Sync compose files + re-sync scripts (sentinel user existe agora)
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
        run: |
          # ESTRATÉGIA: stage em /tmp (escrita livre como celinet), depois
          # 'sudo install' move tudo para /opt/sentinelacs/ com dono e perms
          # corretos atomicamente.
          #
          # Rationale: rsync com --rsync-path="sudo -u sentinel rsync" tem
          # comportamento inconsistente em alguns sshd's — falha silenciosa
          # sem warning. O staging em /tmp evita esse footgun.

          # Limpa stage antigo (se houver, de runs interrompidas).
          ssh "$SSH_USER@$SSH_HOST" 'rm -rf /tmp/sentinel-stage && mkdir -p /tmp/sentinel-stage/scripts'

          # Stage: copia arquivos como celinet (sem sudo).
          rsync -az \
            deploy/docker-compose.yml \
            deploy/docker-compose.prod.yml \
            "$SSH_USER@$SSH_HOST:/tmp/sentinel-stage/"

          rsync -az \
            deploy/scripts/ \
            "$SSH_USER@$SSH_HOST:/tmp/sentinel-stage/scripts/"

          # Move atomicamente para /opt/sentinelacs com dono sentinel:sentinel.
          # 'install' = cp + chown + chmod num único syscall, idempotente.
          ssh "$SSH_USER@$SSH_HOST" '
            set -e
            for f in /tmp/sentinel-stage/docker-compose.yml /tmp/sentinel-stage/docker-compose.prod.yml; do
              sudo install -o sentinel -g sentinel -m 0644 "$f" /opt/sentinelacs/
            done

            for f in /tmp/sentinel-stage/scripts/*.sh; do
              sudo install -o sentinel -g sentinel -m 0755 "$f" /opt/sentinelacs/scripts/
            done

            rm -rf /tmp/sentinel-stage
            # /opt/sentinelacs/ é 0750 sentinel:sentinel — celinet não pode
            # listar, então o glob precisa ser expandido SOB sudo (via bash -c)
            # para enxergar o conteúdo. "sudo ls *.yml" sem isso não funciona:
            # o shell do celinet expande o glob antes do sudo, falha em ler
            # o dir, e passa "*.yml" literal pro ls.
            sudo bash -c "ls -la /opt/sentinelacs/*.yml /opt/sentinelacs/scripts/*.sh"
          '

      - name: Optional reset of existing .env
        if: ${{ inputs.reset_secrets }}
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
        run: |
          echo "::warning::Removendo /opt/sentinelacs/config/.env existente"
          ssh "$SSH_USER@$SSH_HOST" 'sudo rm -f /opt/sentinelacs/config/.env'

      - name: Init secrets (não-interativo)
        env:
          SSH_HOST:    ${{ vars.SSH_HOST }}
          SSH_USER:    ${{ vars.SSH_USER }}
          PUBLIC_HOST: ${{ vars.PUBLIC_HOST }}
          ACME_EMAIL:  ${{ vars.ACME_EMAIL }}
          GHCR_OWNER:  ${{ vars.GHCR_OWNER }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            "sudo -u sentinel env \
                NONINTERACTIVE=1 \
                PUBLIC_HOST='$PUBLIC_HOST' \
                ACME_EMAIL='$ACME_EMAIL' \
                GHCR_OWNER='$GHCR_OWNER' \
              /opt/sentinelacs/scripts/init-secrets.sh"

      - name: Fix .env existente — aspas em valores com espaço + dono correto
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
        run: |
          # Versões antigas do init-secrets.sh geravam linhas tipo
          # NOTIFIER_SMTP_FROM_NAME=SentinelACS Alerts (sem aspas), o que quebra
          # 'source .env' no deploy.sh. Idempotente: só altera se ainda não tem aspas.
          # Bonus: chown sentinel:sentinel + chmod 0640 ao fim — runs anteriores
          # podem ter deixado o .env com dono root:root (sed -i recria o arquivo
          # com dono do invocante).
          ssh "$SSH_USER@$SSH_HOST" '
            sudo bash -c "
              set -e
              ENV=/opt/sentinelacs/config/.env
              if grep -qE \"^NOTIFIER_SMTP_FROM_NAME=[^\\\"].*[[:space:]]\" \"\$ENV\"; then
                sed -i \"s|^NOTIFIER_SMTP_FROM_NAME=\\(.*\\)\$|NOTIFIER_SMTP_FROM_NAME=\\\"\\1\\\"|\" \"\$ENV\"
                echo \"✓ aspas adicionadas em NOTIFIER_SMTP_FROM_NAME\"
              else
                echo \"✓ NOTIFIER_SMTP_FROM_NAME já com aspas (ou sem espaço)\"
              fi
              chown sentinel:sentinel \"\$ENV\"
              chmod 0640 \"\$ENV\"
              echo \"✓ dono e perms do .env normalizados\"
            "
          '

      - name: Login GHCR no servidor
        env:
          SSH_HOST:   ${{ vars.SSH_HOST }}
          SSH_USER:   ${{ vars.SSH_USER }}
          GHCR_PAT:   ${{ secrets.GHCR_PAT }}
          GHCR_OWNER: ${{ vars.GHCR_OWNER }}
        run: |
          # Garante que /opt/sentinelacs/.docker/ existe com dono sentinel.
          # Em re-execuções, runs anteriores podem ter criado config.json com
          # dono diferente — chown -R conserta sem perder o login existente.
          # Stdin do PAT — não fica em ps/history. -H força HOME=/opt/sentinelacs.
          ssh "$SSH_USER@$SSH_HOST" "
            set -e
            sudo install -d -o sentinel -g sentinel -m 0700 /opt/sentinelacs/.docker
            sudo chown -R sentinel:sentinel /opt/sentinelacs/.docker
            echo '$GHCR_PAT' | sudo -H -u sentinel docker login ghcr.io -u '$GHCR_OWNER' --password-stdin
          "

      - name: Deploy inicial
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            'sudo -u sentinel /opt/sentinelacs/scripts/deploy.sh latest'

      - name: Seed admin inicial
        if: ${{ inputs.seed_admin }}
        env:
          SSH_HOST:    ${{ vars.SSH_HOST }}
          SSH_USER:    ${{ vars.SSH_USER }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}
        run: |
          # Gera senha provisória de 24 chars (3 segmentos base32 separados por hífen).
          ADMIN_PWD=$(openssl rand -base64 18 | tr -d '+/=' | tr '[:upper:]' '[:lower:]' | head -c 24)
          ADMIN_EMAIL="${ADMIN_EMAIL:-admin@local}"

          echo "::add-mask::$ADMIN_PWD"

          ssh "$SSH_USER@$SSH_HOST" \
            "sudo -u sentinel docker compose --env-file /opt/sentinelacs/config/.env \
                -f /opt/sentinelacs/docker-compose.yml \
                -f /opt/sentinelacs/docker-compose.prod.yml \
                run --rm \
                  -e SEED_ADMIN_EMAIL='$ADMIN_EMAIL' \
                  -e SEED_ADMIN_PASSWORD='$ADMIN_PWD' \
                  -e SEED_ADMIN_NAME='Administrador' \
                  --entrypoint /usr/local/bin/migrate \
                  app -cmd seed"

          # Persiste no Job Summary (visível para quem tem acesso ao run).
          # Mascarado nos logs via ::add-mask:: acima.
          {
            echo "## 🔑 Admin inicial"
            echo ""
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| email | \`$ADMIN_EMAIL\` |"
            echo "| senha provisória | \`$ADMIN_PWD\` |"
            echo ""
            echo "⚠️ **Faça login agora** em https://${{ vars.PUBLIC_HOST }}/login e troque a senha + cadastre TOTP."
            echo ""
            echo "Se esse Job Summary é sensível para o seu modelo de ameaça, **delete este workflow run** após o uso."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Próximos passos
        env:
          PUBLIC_HOST: ${{ vars.PUBLIC_HOST }}
        run: |
          cat <<EOF
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            Provision concluído.
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          ✅ Servidor está provisionado.

          AGORA:
            1. Apague o secret BOOTSTRAP_SSH_PASSWORD do GitHub
               (Settings → Secrets → Actions → BOOTSTRAP_SSH_PASSWORD → Remove)

            2. SSH no servidor e troque a senha do celinet:
               ssh celinet@${{ vars.SSH_HOST }}
               passwd celinet

            3. Aponte o DNS:
               A   $PUBLIC_HOST  ->  ${{ vars.SSH_HOST }}

            4. Acesse:  https://$PUBLIC_HOST/login
               com o admin criado acima.

          DEPLOYS daqui em diante são automáticos via deploy.yml a cada push em main.
          EOF
