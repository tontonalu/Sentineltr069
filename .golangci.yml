# SentinelACS — golangci-lint config (schema v2)
# Lints conservadores; subimos a régua à medida que o codebase amadurece.

version: "2"

run:
  go: "1.23"
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    # misspell removido: codebase em PT-BR (cancelado, comando, suspenso etc.
    # são corretos; misspell trata como inglês e flagga falso-positivos).
  settings:
    gosec:
      # Exclusões alinhadas com o job de security dedicado (.github/workflows/ci.yml).
      excludes:
        - G101   # falso-positivo: mapas de NOMES de envs (não credenciais)
        - G104   # estilístico: resp.Body.Close em paths de erro já tratado
        - G115   # uint32(len(hash)) seguro — argon2 hash tem tamanho fixo
        - G124   # cookies têm Secure/HttpOnly/SameSite via cfg.App.Env
        - G304   # file inclusion via variable — paths vêm de config validada
        - G710   # uuid.String() não é taintable
    revive:
      rules:
        - name: var-naming
        - name: package-comments
          disabled: true   # ativaremos quando os pacotes amadurecerem
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
    paths:
      - internal/views                          # arquivos *_templ.go gerados
      - internal/infrastructure/postgres/gen
      - third_party$
      - builtin$
      - examples$

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
