# SentinelACS — stack base (dev e servidor da empresa)
#
# CONTEXTO: a aplicação será executada no servidor dentro da rede interna
# da empresa (não nesta máquina). Este arquivo serve para ambos:
#   - Servidor da empresa: `docker compose -f deploy/docker-compose.yml up -d`
#   - Dev local: mesmo comando, mas Voalle/FreeRADIUS ficam inacessíveis (esperado).
#
# Para produção pública (TLS/Traefik) use docker-compose.prod.yml em conjunto.
#
# Variáveis exigidas: ver .env.example

name: sentinel-acs

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  mongodata:
  genieacs_files:

services:
  # ──────────────── Postgres + TimescaleDB ────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: sentinel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    ports:
      - "127.0.0.1:5432:5432"   # acesso só do host (psql, pgAdmin)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────── Redis ────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    networks: [internal]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ──────────────── MongoDB (backend do GenieACS) ────────────────
  mongo:
    image: mongo:7
    container_name: sentinel-mongo
    volumes:
      - mongodata:/data/db
    networks: [internal]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────── GenieACS (CWMP/NBI/FS/UI em um container) ────────────────
  # A imagem drumsergio/genieacs:1.2.16+ usa supervisord para rodar os 4
  # processos juntos (cwmp, nbi, fs, ui), em vez de containers separados.
  # Tentar override com command=genieacs-nbi quebra: o entrypoint default
  # invoca supervisord, e os binários estão em /opt/genieacs/dist/bin/.
  genieacs:
    image: drumsergio/genieacs:1.2.16.1
    container_name: sentinel-genieacs
    environment:
      GENIEACS_MONGODB_CONNECTION_URL: mongodb://mongo:27017/genieacs
      GENIEACS_CWMP_PORT: 7547
      GENIEACS_NBI_PORT: 7557
      GENIEACS_FS_PORT: 7567
      GENIEACS_UI_PORT: 3000
    depends_on:
      mongo: { condition: service_healthy }
    networks: [internal]
    volumes:
      - genieacs_files:/opt/genieacs/files
    ports:
      - "7547:7547"             # CWMP — público para CPEs (TR-069), porta padrão
      - "8080:7547"             # CWMP — fallback para redes que filtram :7547 na borda
      - "7567:7567"             # FS — público para CPEs baixarem firmware
      # 7557 (NBI) e 3000 (UI) NÃO expostos — só rede docker interna.
    restart: unless-stopped

  # ──────────────── SentinelACS — app web ────────────────
  app:
    image: ${IMAGE_TAG:-sentinel-acs:local}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sentinel-app
    # env_file vem dos overrides (dev: docker-compose.dev.yml,
    # prod: docker-compose.prod.yml) — caminhos divergem entre ambientes.
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      genieacs: { condition: service_started }
    networks: [internal]
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ──────────────── SentinelACS — worker ────────────────
  worker:
    image: ${IMAGE_TAG:-sentinel-acs:local}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sentinel-worker
    # Dockerfile fixa ENTRYPOINT=/usr/local/bin/server (formato exec). Para
    # rodar o binário do worker em vez do server, precisamos sobrescrever
    # entrypoint — usar só `command:` faria do path um argumento do server.
    entrypoint: ["/usr/local/bin/worker"]
    # env_file vem dos overrides — ver comentário no service 'app'.
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      genieacs: { condition: service_started }
    networks: [internal]
    volumes:
      # ACL TR-069 — worker escreve a lista canônica de CIDRs aqui;
      # systemd path-unit no host (cwmp-acl-reconcile) detecta a mudança
      # e aplica via iptables-restore. Diretório criado pelo bootstrap.
      - /opt/sentinelacs/cwmp-acl:/var/cwmp-acl:rw
    restart: unless-stopped
